<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard CMS | Brilian.dev</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- ===== LOGIN SECTION ===== -->
    <div id="cms-login-section" style="display: none;">
      <div class="cms-login-wrapper">
        <div class="cms-login-box">
          <div class="cms-login-logo">
            <div class="cms-login-icon">🔐</div>
            <h1>Admin CMS</h1>
            <p>Masuk untuk mengelola konten artikel</p>
          </div>

          <form id="cmsLoginForm">
            <div class="input-group">
              <label for="cms-username">Username</label>
              <input
                type="text"
                id="cms-username"
                placeholder="Masukkan username..."
                autocomplete="username"
              />
            </div>

            <div class="input-group">
              <label for="cms-password">Password</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="cms-password"
                  placeholder="Masukkan password..."
                  autocomplete="current-password"
                />
                <button type="button" id="togglePassword" class="toggle-pw">👁</button>
              </div>
            </div>

            <p id="cmsLoginMessage" class="cms-login-message"></p>

            <button type="submit" id="cmsLoginBtn" class="btn-login-cms">
              Masuk ke Dashboard
            </button>
          </form>

          <a href="../index.html" class="back-link" style="display:block; text-align:center; margin-top: 20px;">
            ← Kembali ke Profil
          </a>
        </div>
      </div>
    </div>

    <!-- ===== DASHBOARD SECTION ===== -->
    <div id="cms-dashboard-section" style="display: none;">
      <div class="container">
        <a href="../index.html" class="back-link">&larr; Kembali ke Profil</a>

        <header class="cms-header">
          <div class="header-content">
            <h1>Dasbor Admin CMS</h1>
            <p>Kelola konten artikel Anda dengan sistem manajemen yang modern.</p>
          </div>
          <button onclick="logoutAdmin()" class="btn-logout">Keluar (Logout)</button>
        </header>

        <!-- Form Input Artikel -->
        <section class="form-section">
          <form id="formArtikel">
            <input type="hidden" id="artikelId" />

            <div class="input-group">
              <label for="judul">Judul Artikel</label>
              <input
                type="text"
                id="judul"
                placeholder="Masukkan judul yang menarik..."
              />
              <small class="pesan-error" id="errorJudul"></small>
            </div>

            <div class="input-group">
              <label for="konten">Isi Konten</label>
              <textarea
                id="konten"
                rows="6"
                placeholder="Tuliskan pemikiran Anda di sini..."
              ></textarea>
              <small class="pesan-error" id="errorKonten"></small>
            </div>

            <div class="aksi-form">
              <button type="submit" id="tombolSimpan" class="btn-utama">
                Simpan Artikel
              </button>
              <button
                type="button"
                id="tombolBatal"
                class="btn-batal"
                style="display: none"
              >
                Batal Edit
              </button>
            </div>
          </form>
        </section>

        <hr />

        <!-- Area Tampilan Daftar Artikel -->
        <section class="list-section">
          <h3>Daftar Artikel Tersimpan</h3>
          <div id="wadahArtikel" class="grid-artikel">
            <!-- Artikel akan muncul di sini melalui JS -->
          </div>
        </section>
      </div>
    </div>

    <!-- ===== TOAST NOTIFICATION CONTAINER ===== -->
    <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

    <!-- ===== CUSTOM CONFIRM MODAL ===== -->
    <div id="confirm-overlay" class="confirm-overlay" style="display:none;">
      <div class="confirm-box">
        <div class="confirm-icon" id="confirm-icon">⚠️</div>
        <h3 class="confirm-title" id="confirm-title">Konfirmasi</h3>
        <p class="confirm-message" id="confirm-message">Apakah Anda yakin?</p>
        <div class="confirm-actions">
          <button id="confirm-cancel-btn" class="btn-confirm-cancel">Batal</button>
          <button id="confirm-ok-btn" class="btn-confirm-ok">Ya, Lanjutkan</button>
        </div>
      </div>
    </div>

    <!-- Menghubungkan JS -->
    <script src="script.js"></script>
  </body>
</html>
